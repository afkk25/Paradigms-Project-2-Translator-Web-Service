<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Darija Translator - Result</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-shell">
    <main class="card card--result">
        <p class="eyebrow">Darija Translator</p>
        <h1 class="title">Translation Result</h1>
        <p class="subtitle">Credentials accepted. Here is your translated text.</p>

        <section class="result-group">
            <h2 class="result-label">Original</h2>
            <p class="result-box" id="originalText"></p>
        </section>

        <section class="result-group">
            <h2 class="result-label">Darija</h2>
            <p class="result-box" id="translatedText"></p>
        </section>

        <div class="result-footer">
            <button class="logout-btn" id="backBtn" type="button">Log Out</button>
        </div>
    </main>

    <script src="translation.js"></script>
</body>
</html>
